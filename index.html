<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet" />

    <style>
      body {
        margin: 0;
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        color: white;
        background-color: #000020;
        background-image: url('https://64.media.tumblr.com/9e19f5a112f04a3cf9b2a2426daac333/tumblr_pte1o02Pju1uzwgsuo1_400.gif');
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
        overflow-x: hidden;
      }

      #darkOverlay {
        position: fixed;
        inset: 0;
        background-color: rgba(0, 0, 30, 0.85);
        z-index: 0;
        pointer-events: none;
      }

      #lockScreen {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 30, 0.95);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      #loginForm {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      #passwordBox {
        padding: 12px 20px;
        font-size: 16px;
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        text-align: center;
        border: 2px solid transparent;
        border-radius: 8px;
        border-image: linear-gradient(to bottom right, #00e5ff, #ff00a0) 1;
        background-color: black;
        color: white;
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        outline: none;
        width: 380px;
        max-width: 85vw;
      }

      #passwordBox::placeholder {
        color: gray;
      }

      .button {
        margin-right: 10px;
        padding: 10px 20px;
        background-color: black;
        color: white;
        border: 2px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
        border-image: linear-gradient(to bottom right, #00e5ff, #ff00a0) 1;
        transition: all 0.3s ease;
        box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        font-family: 'Orbitron', sans-serif;
      }

      .button:hover {
        background-color: rgb(0, 229, 255);
        transform: scale(1.08);
        box-shadow: 0 0 20px #00e5ff, 0 0 40px #ff00a0;
        color: black;
      }

      #wrongPassword {
        display: none;
        color: #ff4d88;
        text-shadow: 0 0 10px #ff00a0;
        font-size: 15px;
      }

      #portalContent {
        display: none;
        position: relative;
        z-index: 10;
      }

      .scroll-container {
        width: 100%;
        overflow-x: auto;
        white-space: nowrap;
        padding: 10px 0;
        border: 2px solid transparent;
        border-image: linear-gradient(to bottom right, #00e5ff, #ff00a0) 1;
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        background: rgba(0, 0, 0, 0.35);
      }

      .scroll-content {
        display: inline-flex;
        align-items: center;
      }

      #viewerContainer {
        position: relative;
        z-index: 10;
        width: 100%;
      }

      #viewerFrame {
        display: none;
        width: 100%;
        height: calc(100vh - 78px);
        border: 2px solid transparent;
        border-image: linear-gradient(to bottom right, #00e5ff, #ff00a0) 1;
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
        background: black;
      }

      #fullscreenButton {
        display: none;
        background-color: black;
        color: white;
        border: 2px solid transparent;
        border-radius: 6px;
        border-image: linear-gradient(to bottom right, #00e5ff, #ff00a0) 1;
        transition: all 0.3s ease;
        box-shadow: 0 0 10px rgb(0, 229, 255);
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        position: relative;
        z-index: 10;
        margin: 8px;
        padding: 10px 16px;
        cursor: pointer;
      }

      #fullscreenButton:hover {
        background-color: rgb(0, 229, 255);
        box-shadow: 0 0 20px #00e5ff, 0 0 40px #ff00a0;
        transform: scale(1.08);
        color: black;
      }

      #statusText {
        position: relative;
        z-index: 10;
        display: none;
        margin: 10px;
        font-size: 12px;
        color: #cccccc;
      }
    </style>
  </head>

  <body>
    <div id="darkOverlay"></div>

    <div id="lockScreen">
      <form id="loginForm">
        <input
          id="passwordBox"
          type="password"
          placeholder="ENTER PASSWORD"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          autofocus
        />
        <button class="button" type="submit">Unlock</button>
        <div id="wrongPassword">Wrong password.</div>
      </form>
    </div>

    <div id="portalContent">
      <div class="scroll-container">
        <div class="scroll-content">
          <img
            src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExYXhic291d2wxcGdlbWI5a2gwZWtzYnR5bHRvNGNpbGduN3FwY3l5aCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/tV5qjZsXMS4ReNCnY2/giphy.gif"
            alt="logo"
            style="width: 50px; height: 50px; margin-right: 10px;"
          />

          <button class="button" onclick="changeEmbed('https://algebra.learnnexus.xyz')">Red's Exploit Corner</button>
          <button class="button" onclick="changeEmbed('https://bflixz.org')">Bflix</button>
          <button class="button" onclick="changeEmbed('https://demo.emulatorjs.org')">emulatorJS</button>
          <button class="button" onclick="changeEmbed('https://krunker.io')">krunker</button>
          <button class="button" onclick="changeEmbed('https://vapor.global.ssl.fastly.net')">VAPOR</button>
          <button class="button" onclick="changeEmbed('https://talhaisbetter.my.to')">pizza edition</button>
          <button class="button" onclick="changeEmbed('https://ytify.pp.ua')">ytify</button>
          <button class="button" onclick="changeEmbed('https://radical.global.ssl.fastly.net')">Radical</button>
          <button class="button" onclick="changeEmbed('https://vivek9patel.github.io')">Unbuntu</button>
          <button class="button" onclick="changeEmbed('https://binjadagoat.global.ssl.fastly.net')">Ghoogle</button>
          <button class="button" onclick="changeEmbed('https://console.upstage.ai/playground/chat')">Solar AI</button>
          <button class="button" onclick="changeEmbed('https://jobi.one/#home')">UniUB</button>
          <button class="button" onclick="changeEmbed('https://learnaboutducks.me/')">DuckHTML</button>
          <button class="button" onclick="changeEmbed('https://gleesh.a.ssl.fastly.net')">arsenic</button>
          <button class="button" onclick="changeEmbed('https://ppxlarr.web.app/index.html')">pxlarr</button>
          <button class="button" onclick="changeEmbed('https://tbg95.s3.amazonaws.com/index.html')">tbg95</button>
          <button class="button" onclick="changeEmbed('https://boredomarcade.xyz')">boredom</button>
          <button class="button" onclick="changeEmbed('https://loungef2x-t.global.ssl.fastly.net')">loungef2x</button>
          <button class="button" onclick="changeEmbed('https://web.cloudmoonapp.com/')">cloudmoon</button>
          <button class="button" onclick="changeEmbed('https://bulbasaurchat.github.io')">bulbasaur</button>
          <button class="button" onclick="changeEmbed('https://duckmath.org/')">Duck</button>
          <button class="button" onclick="changeEmbed('https://washingmachine-seven.vercel.app')">rangoon</button>
        </div>
      </div>
    </div>

    <button id="fullscreenButton" onclick="toggleFullscreen()">Go Fullscreen</button>
    <div id="statusText">Loading page. If it stays blank, that website probably blocks iframe embedding.</div>

    <div id="viewerContainer">
      <iframe id="viewerFrame" allowfullscreen></iframe>
    </div>

    <script>
      const PASSWORD = 'letmein123';

      const loginForm = document.getElementById('loginForm');
      const passwordBox = document.getElementById('passwordBox');
      const wrongPassword = document.getElementById('wrongPassword');
      const lockScreen = document.getElementById('lockScreen');
      const portalContent = document.getElementById('portalContent');

      loginForm.addEventListener('submit', function (event) {
        event.preventDefault();

        const typedPassword = passwordBox.value.trim();

        if (typedPassword === PASSWORD) {
          lockScreen.style.display = 'none';
          portalContent.style.display = 'block';
          wrongPassword.style.display = 'none';
          passwordBox.value = '';
        } else {
          wrongPassword.style.display = 'block';
          passwordBox.value = '';
          passwordBox.focus();
        }
      });

      function changeEmbed(url) {
        const frame = document.getElementById('viewerFrame');
        const fullscreenButton = document.getElementById('fullscreenButton');
        const statusText = document.getElementById('statusText');

        frame.style.display = 'block';
        fullscreenButton.style.display = 'inline-block';
        statusText.style.display = 'block';

        frame.src = url;
      }

      function toggleFullscreen() {
        const frame = document.getElementById('viewerFrame');

        if (!frame || frame.style.display === 'none') return;

        if (frame.requestFullscreen) frame.requestFullscreen();
        else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
        else if (frame.msRequestFullscreen) frame.msRequestFullscreen();
      }
    </script>
  </body>
</html>
