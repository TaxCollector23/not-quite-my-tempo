      /* sandbox preview modal */

        justify-content: center;

        background: rgba(0, 0, 0, 0.6);

      #sandboxContent {

        border-radius: 8px;
        overflow: hidden;
        border: 2px solid transparent;
        border-image: linear-gradient(to bottom right, #00e5ff, #ff00a0) 1;
        display: flex;

      #sandboxToolbar {

        justify-content: flex-end;

        background: rgba(0,0,0,0.6);
        align-items: center;

      #sandboxIframe {

      .miniBtn {
        padding: 6px 10px;

        cursor: pointer;
        background: black;
        color: white;
        font-weight: 700;

      .miniBtn:hover { transform: scale(1.05); background: #00e5ff; color: black; }

      /* portal content hidden behind lock until unlocked */

    <button id="fullscreenButton" onclick="toggleFullscreen()" style="display:none;">Go Fullscreen</button>

    <!-- SANDBOX PREVIEW MODAL -->
    <div id="sandboxModal" role="dialog" aria-hidden="true">
      <div id="sandboxContent">

          <button class="miniBtn" id="sandboxClose" onclick="closeSandbox()">Close</button>
          <button class="miniBtn" id="sandboxOpenNew" onclick="openSandboxInNewWindow()">Open in new window</button>
        </div>
        <iframe id="sandboxIframe" sandbox="allow-scripts allow-forms"></iframe>
      </div>

    <script>
      let useIframe = false;
      const PASSWORD = 'nobobneth';

      function handleUnlockOrRun(e) {
        if (e.key !== 'Enter') return;
        const raw = e.target.value || '';
        const val = raw.trim();
        if (val === PASSWORD) {
          unlockPortal();
          // clear input for security
          e.target.value = '';
        } else {
          // open sandboxed preview of what the user typed
          openSandbox(val);
          // keep the input text (or clear, choose to clear to be tidy)
          e.target.value = '';
        }
      }

      function unlockPortal() {
        const lock = document.getElementById('lockScreen');
        const portal = document.getElementById('portalContent');
        lock.style.display = 'none';
        portal.style.display = 'block';
        document.getElementById('fullscreenButton').style.display = 'inline-block';
        document.getElementById('toggleModeButton').style.display = 'inline-block';
      }

      function openSandbox(userHtml) {
        const modal = document.getElementById('sandboxModal');
        const iframe = document.getElementById('sandboxIframe');

        // create blob URL from user-provided html
        const safeHtml = userHtml || '<!-- empty -->';
        const blob = new Blob([safeHtml], { type: 'text/html' });
        const url = URL.createObjectURL(blob);

        // set iframe src to blob url; iframe has sandbox attribute to isolate it
        iframe.src = url;

        // store the blob url for optional opening in a separate window
        iframe.dataset.blobUrl = url;

        modal.style.display = 'flex';
        modal.setAttribute('aria-hidden', 'false');
      }

      function closeSandbox() {
        const modal = document.getElementById('sandboxModal');
        const iframe = document.getElementById('sandboxIframe');
        // revoke blob URL to avoid leaks
        const url = iframe.dataset.blobUrl;
        if (url) {
          try { URL.revokeObjectURL(url); } catch (_) {}
          delete iframe.dataset.blobUrl;
        }
        iframe.src = 'about:blank';
        modal.style.display = 'none';
        modal.setAttribute('aria-hidden', 'true');
      }

      function openSandboxInNewWindow() {
        const iframe = document.getElementById('sandboxIframe');
        const url = iframe.dataset.blobUrl;
        if (!url) return;
        // Open the blob URL in a new window/tab. This is still isolated by browser security.
        // We do NOT attempt to bypass sandboxing or allow this new window to access the opener.
        window.open(url, '_blank', 'noopener,noreferrer');
      }

      function changeEmbed(url) {
        const container = document.getElementById('viewerContainer');
        container.innerHTML = '';
        const element = document.createElement(useIframe ? 'iframe' : 'embed');
        element.src = url;
        element.width = '100%';
        element.height = window.innerHeight + 'px';
        element.className = 'embed';
        element.allowFullscreen = true;
        container.appendChild(element);
        // ensure fullscreen/toggle controls visible when portal unlocked
        document.getElementById('fullscreenButton').style.display = 'inline-block';
        document.getElementById('toggleModeButton').style.display = 'inline-block';
      }

      window.onresize = function () {
        const viewer = document.getElementById('viewerContainer').firstChild;
        if (viewer) viewer.style.height = window.innerHeight + 'px';
        const iframe = document.getElementById('sandboxIframe');
        if (iframe) iframe.style.height = (window.innerHeight * 0.8 - 40) + 'px';
      };

      function toggleFullscreen() {
        const viewer = document.getElementById('viewerContainer').firstChild;
        if (!viewer) return;
        if (viewer.requestFullscreen) viewer.requestFullscreen();
        else if (viewer.mozRequestFullScreen) viewer.mozRequestFullScreen();
        else if (viewer.webkitRequestFullscreen) viewer.webkitRequestFullscreen();
        else if (viewer.msRequestFullscreen) viewer.msRequestFullscreen();
      }

      function toggleMode() {
        useIframe = !useIframe;
        const btn = document.getElementById('toggleModeButton');
        btn.textContent = useIframe ? 'Use embed' : 'Use iframe';
        const currentSrc = document.getElementById('viewerContainer').firstChild?.src;
        if (currentSrc) changeEmbed(currentSrc);
      }

      // initialize sandbox iframe height
      (function init() {
        const iframe = document.getElementById('sandboxIframe');
        iframe.style.height = (window.innerHeight * 0.8 - 40) + 'px';
      })();
    </script>
